name: Generate Plugin Release

on:
  push:
    # Trigger on version tags, e.g., v1.0.0, v2.1.3
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Plugin Archive
        run: |
          # Create a dedicated directory with the plugin slug
          mkdir -p /tmp/kriti-bangla-fonts
          
          # Copy all files from the workspace into the directory
          # Excludes repository/dev-specific files so they don't bloat the release
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='.gitignore' \
                    --exclude='assets/banner-*' \
                    --exclude='assets/screenshot-*' \
                    --exclude='README.md' \
                    --exclude='fix.md' \
                    . /tmp/kriti-bangla-fonts/
          
          # Create the zip file
          cd /tmp
          zip -r kriti-bangla-fonts.zip kriti-bangla-fonts/
          
          # Move the zip back to the GitHub workspace
          mv kriti-bangla-fonts.zip ${{ github.workspace }}/kriti-bangla-fonts.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kriti-bangla-fonts.zip
          generate_release_notes: true
          draft: false
          prerelease: false
